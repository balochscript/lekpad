name: Lekpad CI/CD Build Workflow

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Lekpad repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Flutter project
        run: |
          mkdir -p temp_custom/android temp_custom/ios temp_custom/lib temp_custom/scripts temp_custom/images
          mv lib/* temp_custom/lib/ 2>/dev/null || true
          mv android/* temp_custom/android/ 2>/dev/null || true
          mv ios/* temp_custom/ios/ 2>/dev/null || true
          mv scripts/* temp_custom/scripts/ 2>/dev/null || true
          mv images/* temp_custom/images/ 2>/dev/null || true
          mv pubspec.yaml temp_custom/
          
          rm -rf android ios lib scripts images
          
          flutter create --org bc.lekpad --project-name balochi lekpad_scaffold
          
          mv lekpad_scaffold/* .
          mv lekpad_scaffold/.[!.]* . || true
          rm -rf lekpad_scaffold
          
          mkdir -p lib scripts images
          cp -r temp_custom/lib/* lib/
          cp -r temp_custom/scripts/* scripts/
          cp -r temp_custom/images/* images/
          cp temp_custom/pubspec.yaml .
          
          mkdir -p android/app/src/main/kotlin/bc/lekpad/balochi
          cp temp_custom/android/BalochiInputMethod.kt android/app/src/main/kotlin/bc/lekpad/balochi/
          cp temp_custom/android/MainActivity.kt android/app/src/main/kotlin/bc/lekpad/balochi/
          
          mkdir -p android/app/src/main/res/xml
          mkdir -p android/app/src/main/res/layout
          cp temp_custom/android/app/src/main/res/xml/method.xml android/app/src/main/res/xml/
          cp temp_custom/android/app/src/main/res/layout/keyboard_view.xml android/app/src/main/res/layout/
          cp temp_custom/android/app/src/main/res/layout/popup_keyboard.xml android/app/src/main/res/layout/
          
          python scripts/inject_android.py
          
          mkdir -p assets/fonts assets/sounds
          curl -L -o assets/fonts/Amiri-Regular.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf
          curl -L -o assets/fonts/Amiri-Bold.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Bold.ttf
          curl -L -o assets/sounds/key_click.mp3 https://github.com/balochscript/lekpad/releases/download/assets/key_click.mp3 || echo "Skip sound"
          
          flutter pub get
          
          echo "Forcing global compileSdk to 36 in root build.gradle..."
          sed -i '/buildscript {/a\    ext {\n        compileSdkVersion = 36\n        targetSdkVersion = 36\n        minSdkVersion = 21\n    }\n' android/build.gradle
          
          echo "Updating app build.gradle..."
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' android/app/build.gradle
            sed -i 's/targetSdk flutter.targetSdkVersion/targetSdk 36/' android/app/build.gradle
            sed -i 's/minSdk flutter.minSdkVersion/minSdk 21/' android/app/build.gradle
          fi
          
          echo "Forcing all subprojects to use compileSdk 36..."
          cat >> android/build.gradle << 'EOF'

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            android {
                compileSdk 36
                defaultConfig {
                    minSdk 21
                    targetSdk 36
                }
            }
        }
    }
}
EOF
          
          dart run flutter_launcher_icons
          
          rm -rf temp_custom

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lekpad-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lekpad-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS (Runner App Bundle)
    runs-on: macos-latest

    steps:
      - name: Checkout Lekpad repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Flutter project
        run: |
          mkdir -p temp_custom/android temp_custom/ios temp_custom/lib temp_custom/scripts temp_custom/images
          mv lib/* temp_custom/lib/ 2>/dev/null || true
          mv android/* temp_custom/android/ 2>/dev/null || true
          mv ios/* temp_custom/ios/ 2>/dev/null || true
          mv scripts/* temp_custom/scripts/ 2>/dev/null || true
          mv images/* temp_custom/images/ 2>/dev/null || true
          mv pubspec.yaml temp_custom/
          
          rm -rf android ios lib scripts images
          
          flutter create --org bc.lekpad --project-name balochi lekpad_scaffold
          
          mv lekpad_scaffold/* .
          mv lekpad_scaffold/.[!.]* . || true
          rm -rf lekpad_scaffold
          
          mkdir -p lib scripts images
          cp -r temp_custom/lib/* lib/
          cp -r temp_custom/scripts/* scripts/
          cp -r temp_custom/images/* images/
          cp temp_custom/pubspec.yaml .
          
          cp temp_custom/ios/KeyboardViewController.swift ios/
          
          mkdir -p assets/fonts assets/sounds
          curl -L -o assets/fonts/Amiri-Regular.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf
          curl -L -o assets/fonts/Amiri-Bold.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Bold.ttf
          curl -L -o assets/sounds/key_click.mp3 https://github.com/balochscript/lekpad/releases/download/assets/key_click.mp3 || echo "Skip sound"
          
          gem install xcodeproj
          
          ruby scripts/setup_ios.rb
          
          flutter pub get
          dart run flutter_launcher_icons
          
          rm -rf temp_custom

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lekpad-ios-app
          path: build/ios/iphoneos/Runner.app
