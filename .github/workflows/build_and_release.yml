name: Lekpad CI/CD Build Workflow

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Lekpad repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Flutter project
        run: |
          mkdir -p temp_custom/android temp_custom/ios temp_custom/lib temp_custom/scripts temp_custom/images temp_custom/assets
          [ -d "lib" ] && mv lib/* temp_custom/lib/ || true
          [ -d "android" ] && mv android/* temp_custom/android/ || true
          [ -d "ios" ] && mv ios/* temp_custom/ios/ || true
          [ -d "scripts" ] && mv scripts/* temp_custom/scripts/ || true
          [ -d "images" ] && mv images/* temp_custom/images/ || true
          [ -d "assets" ] && mv assets/* temp_custom/assets/ || true
          [ -f "pubspec.yaml" ] && mv pubspec.yaml temp_custom/ || true
          
          rm -rf android ios lib scripts images assets
          
          flutter create --org bc.lekpad --project-name balochi lekpad_scaffold
          
          mv lekpad_scaffold/* .
          mv lekpad_scaffold/.[!.]* . || true
          rm -rf lekpad_scaffold
          
          mkdir -p lib scripts images assets
          [ -d "temp_custom/lib" ] && cp -r temp_custom/lib/* lib/ || true
          [ -d "temp_custom/scripts" ] && cp -r temp_custom/scripts/* scripts/ || true
          [ -d "temp_custom/images" ] && cp -r temp_custom/images/* images/ || true
          [ -d "temp_custom/assets" ] && cp -r temp_custom/assets/* assets/ || true
          [ -f "temp_custom/pubspec.yaml" ] && cp temp_custom/pubspec.yaml . || true
          
          mkdir -p android/app/src/main/kotlin/bc/lekpad/balochi
          cp temp_custom/android/BalochiInputMethod.kt android/app/src/main/kotlin/bc/lekpad/balochi/ || true
          cp temp_custom/android/MainActivity.kt android/app/src/main/kotlin/bc/lekpad/balochi/ || true
          
          mkdir -p android/app/src/main/res/xml
          mkdir -p android/app/src/main/res/layout
          mkdir -p android/app/src/main/res/raw
          
          cp temp_custom/android/app/src/main/res/xml/method.xml android/app/src/main/res/xml/ || true
          cp temp_custom/android/app/src/main/res/layout/keyboard_view.xml android/app/src/main/res/layout/ || true
          cp temp_custom/android/app/src/main/res/layout/popup_keyboard.xml android/app/src/main/res/layout/ || true
          
          if [ -f "temp_custom/android/app/src/main/res/raw/key_click.mp3" ]; then
              cp temp_custom/android/app/src/main/res/raw/key_click.mp3 android/app/src/main/res/raw/ || true
          elif [ -f "assets/sounds/key_click.mp3" ]; then
              cp assets/sounds/key_click.mp3 android/app/src/main/res/raw/ || true
          fi
          
          python scripts/inject_android.py
          
          mkdir -p assets/fonts
          curl -f -L -o assets/fonts/Amiri-Regular.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf || true
          curl -f -L -o assets/fonts/Amiri-Bold.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Bold.ttf || true
          
          python -c '
          import os
          
          app_gradle = "android/app/build.gradle"
          if os.path.exists(app_gradle):
              with open(app_gradle, "r") as f: data = f.read()
              data = data.replace("flutter.compileSdkVersion", "34")
              data = data.replace("flutter.targetSdkVersion", "34")
              data = data.replace("flutter.minSdkVersion", "21")
              with open(app_gradle, "w") as f: f.write(data)
              
          app_gradle_kts = "android/app/build.gradle.kts"
          if os.path.exists(app_gradle_kts):
              with open(app_gradle_kts, "r") as f: data = f.read()
              data = data.replace("flutter.compileSdkVersion", "34")
              data = data.replace("flutter.targetSdkVersion", "34")
              data = data.replace("flutter.minSdkVersion", "21")
              with open(app_gradle_kts, "w") as f: f.write(data)
              
          root_gradle = "android/build.gradle"
          force_script = """
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileSdkVersion = 34
                      }
                  }
              }
          }
          """
          if os.path.exists(root_gradle):
              with open(root_gradle, "a") as f: f.write(force_script)
          '
          
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          flutter pub get
          dart run flutter_launcher_icons
          
          rm -rf temp_custom

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Release App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lekpad-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lekpad-android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS (Runner App Bundle)
    runs-on: macos-latest

    steps:
      - name: Checkout Lekpad repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Scaffold Flutter project
        run: |
          mkdir -p temp_custom/android temp_custom/ios temp_custom/lib temp_custom/scripts temp_custom/images temp_custom/assets
          [ -d "lib" ] && mv lib/* temp_custom/lib/ || true
          [ -d "android" ] && mv android/* temp_custom/android/ || true
          [ -d "ios" ] && mv ios/* temp_custom/ios/ || true
          [ -d "scripts" ] && mv scripts/* temp_custom/scripts/ || true
          [ -d "images" ] && mv images/* temp_custom/images/ || true
          [ -d "assets" ] && mv assets/* temp_custom/assets/ || true
          [ -f "pubspec.yaml" ] && mv pubspec.yaml temp_custom/ || true
          
          rm -rf android ios lib scripts images assets
          
          flutter create --org bc.lekpad --project-name balochi lekpad_scaffold
          
          mv lekpad_scaffold/* .
          mv lekpad_scaffold/.[!.]* . || true
          rm -rf lekpad_scaffold
          
          mkdir -p lib scripts images assets
          [ -d "temp_custom/lib" ] && cp -r temp_custom/lib/* lib/ || true
          [ -d "temp_custom/scripts" ] && cp -r temp_custom/scripts/* scripts/ || true
          [ -d "temp_custom/images" ] && cp -r temp_custom/images/* images/ || true
          [ -d "temp_custom/assets" ] && cp -r temp_custom/assets/* assets/ || true
          [ -f "temp_custom/pubspec.yaml" ] && cp temp_custom/pubspec.yaml . || true
          
          cp temp_custom/ios/KeyboardViewController.swift ios/ || true
          
          mkdir -p assets/fonts
          curl -f -L -o assets/fonts/Amiri-Regular.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Regular.ttf || true
          curl -f -L -o assets/fonts/Amiri-Bold.ttf https://github.com/google/fonts/raw/main/ofl/amiri/Amiri-Bold.ttf || true
          
          gem install xcodeproj
          ruby scripts/setup_ios.rb
          
          flutter pub get
          dart run flutter_launcher_icons
          
          rm -rf temp_custom

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lekpad-ios-app
          path: build/ios/iphoneos/Runner.app
